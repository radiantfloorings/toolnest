<!DOCTYPE html>
<html>

<head>

<title>ToolNest - Free Online Tools</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
text-align:center;
}

header{
background:#2563eb;
color:white;
padding:40px;
}

.tools{
padding:30px;
}

.card{
display:inline-block;
background:white;
padding:20px;
margin:10px;
width:220px;
border-radius:10px;
text-decoration:none;
color:black;
font-weight:bold;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card:hover{
transform:scale(1.05);
}

footer{
padding:20px;
}

</style>

</head>

<body>

<header>

<h1>ToolNest</h1>

<p>100% Free Online Tools</p>

  <input type="text" id="search" placeholder="Search tools...">

</header>

<div class="tools">

<a class="card"
href="age-calculator.html">

Age Calculator

</a>


  <a class="card"
href="percentage-calculator.html">

Percentage Calculator

</a>

</div>

<footer>

© 2026 ToolNest

</footer>

  <script>
document.getElementById("search").addEventListener("keyup", function() {

let input = this.value.toLowerCase();
let tools = document.getElementsByClassName("card");

for (let i = 0; i < tools.length; i++) {
let text = tools[i].innerText.toLowerCase();

if (text.includes(input)) {
tools[i].style.display = "inline-block";
} else {
tools[i].style.display = "none";
}
}

});
</script>

</body>

</html>
