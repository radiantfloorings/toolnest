<!DOCTYPE html>
<html>

<head>
<title>Age Calculator</title>
</head>

<body>

<h1>Age Calculator</h1>

<input type="date" id="dob">

<button onclick="calculateAge()">
Calculate
</button>

<h2 id="result"></h2>

<script>

function calculateAge(){

let dob =
new Date(
document.getElementById("dob").value
);

let today =
new Date();

let age =
today.getFullYear()
-
dob.getFullYear();

document.getElementById("result")
.innerHTML =
"Your age is "
+ age +
" years";

}

</script>

</body>

</html>
